<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Робот-Радар | Рабочая версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1e;
            color: #eef2ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-bar {
            background: #111827;
            border-bottom: 1px solid #1f2a3e;
            padding: 8px 16px 0;
            display: flex;
            gap: 24px;
            flex-shrink: 0;
        }

        .tab-button {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 0 10px;
            color: #9ca3af;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .tab-button.active {
            color: #60a5fa;
            border-bottom: 2px solid #60a5fa;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active-pane {
            display: block;
        }

        .camera-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }

        video {
            width: 100%;
            height: auto;
            min-height: 280px;
            object-fit: cover;
            display: block;
        }

        .overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .status-icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 4px;
        }

        .status-label {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .status-value {
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .status-active { color: #10b981; }
        .status-inactive { color: #ef4444; }

        .speed-section {
            background: #1e293b;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            border: 2px solid #facc15;
        }

        .speed-title {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .speed-value {
            font-size: 4rem;
            font-weight: 800;
            font-family: monospace;
            color: #facc15;
        }

        .speed-unit {
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .debug-panel {
            background: #0f172a;
            border-radius: 12px;
            padding: 10px;
            margin-top: 12px;
            font-size: 0.7rem;
            font-family: monospace;
            color: #60a5fa;
        }

        .alert {
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .alert-success { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .alert-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .alert-warning { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .alert-info { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }

        .fines-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .fine-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
        }

        .fine-photo {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
        }

        .fine-info {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .fine-datetime {
            font-family: monospace;
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .fine-rpm {
            background: #dc2626;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .empty-fines {
            text-align: center;
            padding: 40px;
            background: #1e293b;
            border-radius: 20px;
            color: #94a3b8;
        }

        .clear-btn {
            background: #334155;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            margin-top: 16px;
            width: 100%;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-button active" data-tab="camera">📸 Радар</button>
    <button class="tab-button" data-tab="fines">📜 Штрафы</button>
</div>

<div class="tab-content">
    <div id="camera-pane" class="tab-pane active-pane">
        <div class="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <span class="status-icon">📱</span>
                <div class="status-label">Стабильность</div>
                <div class="status-value" id="phoneStatus">✅ СТАБИЛЕН</div>
            </div>
            <div class="status-card">
                <span class="status-icon" id="robotIconDisplay">🤖</span>
                <div class="status-label">Робот</div>
                <div class="status-value" id="robotStatusDisplay">🔍 ПОИСК...</div>
            </div>
        </div>

        <div class="speed-section">
            <div class="speed-title">🌀 СКОРОСТЬ ВРАЩЕНИЯ</div>
            <div>
                <span class="speed-value" id="rpmValue">0</span>
                <span class="speed-unit">об/мин</span>
            </div>
            <div id="speedInfo" style="font-size: 0.7rem; color: #60a5fa; margin-top: 8px;">Двигайте объект перед камерой</div>
        </div>

        <div id="alerts"></div>

        <div class="debug-panel" id="debugPanel">
            🟢 Система активна | Движение: 0.00
        </div>
    </div>

    <div id="fines-pane" class="tab-pane">
        <div id="finesList"></div>
        <button id="clearFinesBtn" class="clear-btn">🗑 Очистить историю</button>
    </div>
</div>

<script>
    // ========== ПРОСТАЯ РАБОЧАЯ ВЕРСИЯ ==========
    
    // Получаем элементы
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const rpmSpan = document.getElementById('rpmValue');
    const robotStatusDisplay = document.getElementById('robotStatusDisplay');
    const robotIconDisplay = document.getElementById('robotIconDisplay');
    const phoneStatusSpan = document.getElementById('phoneStatus');
    const alertsDiv = document.getElementById('alerts');
    const debugPanel = document.getElementById('debugPanel');
    const speedInfo = document.getElementById('speedInfo');
    
    // Переменные состояния
    let previousFrame = null;
    let currentRPM = 0;
    let filteredRPM = 0;
    let robotDetected = false;
    let fines = [];
    let lastViolationTime = 0;
    let animationRunning = true;
    let frameCount = 0;
    let motionValue = 0;
    
    // Загрузка штрафов
    function loadFines() {
        try {
            const saved = localStorage.getItem('robot_radar_fines');
            if (saved) fines = JSON.parse(saved);
        } catch(e) { fines = []; }
        renderFines();
    }
    
    function saveFines() {
        localStorage.setItem('robot_radar_fines', JSON.stringify(fines.slice(0, 30)));
    }
    
    // Сделать фото
    function takePhoto() {
        if (!video.videoWidth) return null;
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        // Добавляем данные
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', { hour12: false });
        const dateStr = now.toLocaleDateString('ru-RU');
        
        ctx.font = 'bold 12px monospace';
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
        ctx.fillStyle = '#facc15';
        ctx.fillText(`🚨 ${dateStr} ${timeStr} | ${currentRPM.toFixed(0)} об/мин`, 10, canvas.height - 8);
        
        return canvas.toDataURL('image/jpeg', 0.8);
    }
    
    // Добавить штраф
    function addFine() {
        const photo = takePhoto();
        if (!photo) return;
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', { hour12: false });
        const dateStr = now.toLocaleDateString('ru-RU');
        
        fines.unshift({
            photo: photo,
            time: `${dateStr} ${timeStr}`,
            rpm: currentRPM.toFixed(0)
        });
        
        saveFines();
        renderFines();
        
        showAlert('danger', `⚠️ ШТРАФ! ${currentRPM.toFixed(0)} об/мин - превышение скорости`, 3000);
        
        if (navigator.vibrate) navigator.vibrate(200);
    }
    
    function renderFines() {
        const container = document.getElementById('finesList');
        if (!container) return;
        
        if (fines.length === 0) {
            container.innerHTML = '<div class="empty-fines">📭 Нет нарушений</div>';
            return;
        }
        
        container.innerHTML = fines.map(f => `
            <div class="fine-card">
                <img class="fine-photo" src="${f.photo}" alt="Нарушение">
                <div class="fine-info">
                    <span class="fine-datetime">🕒 ${f.time}</span>
                    <span class="fine-rpm">⚡ ${f.rpm} об/мин</span>
                </div>
            </div>
        `).join('');
    }
    
    function clearFines() {
        if (confirm('Удалить все штрафы?')) {
            fines = [];
            saveFines();
            renderFines();
            showAlert('info', 'История очищена', 1500);
        }
    }
    
    function showAlert(type, message, duration = 2500) {
        alertsDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        setTimeout(() => {
            if (alertsDiv.innerHTML.includes(message)) {
                alertsDiv.innerHTML = '';
            }
        }, duration);
    }
    
    // ========== ГЛАВНАЯ ФУНКЦИЯ - АНАЛИЗ ДВИЖЕНИЯ ==========
    function getGrayFrame(width, height) {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, width, height);
        const imgData = ctx.getImageData(0, 0, width, height);
        const data = imgData.data;
        const gray = new Uint8ClampedArray(width * height);
        for (let i = 0; i < width * height; i++) {
            gray[i] = (data[i*4] + data[i*4+1] + data[i*4+2]) / 3;
        }
        return gray;
    }
    
    function calculateMotion(prev, curr) {
        if (!prev || !curr) return 0;
        let diff = 0;
        let count = 0;
        // Берем каждый 5-й пиксель для скорости
        for (let i = 0; i < prev.length; i += 5) {
            diff += Math.abs(prev[i] - curr[i]);
            count++;
        }
        return diff / count;
    }
    
    // Простое распознавание робота (ищет контрастные области)
    function detectRobotSimple(width, height) {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, width, height);
        const imgData = ctx.getImageData(0, 0, width, height);
        const data = imgData.data;
        
        let edges = 0;
        
        for (let y = 8; y < height - 8; y += 8) {
            for (let x = 8; x < width - 8; x += 8) {
                const idx = (y * width + x) * 4;
                const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                const idxR = (y * width + x + 5) * 4;
                const brightR = (data[idxR] + data[idxR+1] + data[idxR+2]) / 3;
                if (Math.abs(bright - brightR) > 45) edges++;
            }
        }
        
        return edges > 35;
    }
    
    // Рисуем рамку
    function drawOverlay(detected) {
        const ctx = overlayCanvas.getContext('2d');
        if (!video.videoWidth) return;
        
        overlayCanvas.width = video.videoWidth;
        overlayCanvas.height = video.videoHeight;
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        
        if (detected) {
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 4;
            ctx.strokeRect(10, 10, overlayCanvas.width - 20, overlayCanvas.height - 20);
            ctx.font = 'bold 14px system-ui';
            ctx.fillStyle = '#10b981';
            ctx.fillText('🤖 РОБОТ ОБНАРУЖЕН', 20, 40);
        }
    }
    
    // ========== ОСНОВНОЙ ЦИКЛ ==========
    let lastRobotCheck = 0;
    
    async function analyzeFrame() {
        if (!video.videoWidth || video.videoWidth === 0) {
            requestAnimationFrame(analyzeFrame);
            return;
        }
        
        frameCount++;
        
        // Получаем маленькое изображение для анализа движения
        const smallW = 80;
        const smallH = Math.floor(smallW * video.videoHeight / video.videoWidth);
        const gray = getGrayFrame(smallW, smallH);
        
        // Вычисляем движение
        motionValue = calculateMotion(previousFrame, gray);
        
        // Преобразуем движение в RPM
        let rawRPM = motionValue * 12;
        if (rawRPM > 150) rawRPM = 150;
        filteredRPM = filteredRPM * 0.7 + rawRPM * 0.3;
        currentRPM = Math.floor(filteredRPM);
        
        // Обновляем дисплей
        rpmSpan.textContent = currentRPM;
        
        // Обновляем отладочную панель
        debugPanel.innerHTML = `🟢 Система активна | Движение: ${motionValue.toFixed(2)} | RPM: ${currentRPM}`;
        
        // Информация о скорости
        if (currentRPM > 0) {
            speedInfo.innerHTML = `📊 Текущая скорость: ${currentRPM} об/мин`;
            if (currentRPM > 30) {
                speedInfo.style.color = '#f59e0b';
            } else {
                speedInfo.style.color = '#60a5fa';
            }
        } else {
            speedInfo.innerHTML = `🔄 Двигайте объект перед камерой чтобы увидеть скорость`;
            speedInfo.style.color = '#60a5fa';
        }
        
        // Распознавание робота (раз в секунду)
        if (frameCount % 15 === 0) {
            const detectW = 100;
            const detectH = Math.floor(detectW * video.videoHeight / video.videoWidth);
            const detected = detectRobotSimple(detectW, detectH);
            robotDetected = detected;
            
            if (robotDetected) {
                robotStatusDisplay.innerHTML = '✅ ОБНАРУЖЕН';
                robotStatusDisplay.className = 'status-value status-active';
                robotIconDisplay.innerHTML = '🤖✅';
                drawOverlay(true);
            } else {
                robotStatusDisplay.innerHTML = '❌ НЕ НАЙДЕН';
                robotStatusDisplay.className = 'status-value status-inactive';
                robotIconDisplay.innerHTML = '🤖❌';
                drawOverlay(false);
            }
        }
        
        // Проверка превышения скорости (если робот обнаружен)
        const now = Date.now();
        if (robotDetected && currentRPM > 50 && now - lastViolationTime > 2500) {
            addFine();
            lastViolationTime = now;
            showAlert('danger', `⚠️ ПРЕВЫШЕНИЕ! ${currentRPM} об/мин - штраф оформлен`, 3000);
        }
        
        // Сохраняем кадр для следующего сравнения
        previousFrame = gray;
        
        requestAnimationFrame(analyzeFrame);
    }
    
    // ========== ЗАПУСК КАМЕРЫ ==========
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            video.srcObject = stream;
            await video.play();
            showAlert('success', '✅ Камера работает! Двигайте объект перед камерой', 2000);
            
            // Ждем немного и запускаем анализ
            setTimeout(() => {
                analyzeFrame();
            }, 500);
        } catch (err) {
            console.error('Camera error:', err);
            // Пробуем без точного режима
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await video.play();
                showAlert('success', '✅ Камера работает!', 2000);
                setTimeout(() => {
                    analyzeFrame();
                }, 500);
            } catch(e) {
                showAlert('danger', '❌ Нет доступа к камере', 3000);
                debugPanel.innerHTML = '🔴 Ошибка: нет доступа к камере';
            }
        }
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        loadFines();
        startCamera();
        
        // Кнопка очистки
        document.getElementById('clearFinsBtn').addEventListener('click', clearFines);
        
        // Переключение вкладок
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
                document.getElementById(`${tab}-pane`).classList.add('active-pane');
            });
        });
        
        // Имитация стабильности телефона (всегда стабилен для простоты)
        phoneStatusSpan.innerHTML = '✅ СТАБИЛЕН';
        phoneStatusSpan.className = 'status-value status-active';
        
        showAlert('info', '💡 Совет: двигайте объект перед камерой - спидометр покажет скорость!', 4000);
    }
    
    // Запуск
    init();
    
    // Очистка при закрытии
    window.addEventListener('beforeunload', () => {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
        }
    });
</script>
</body>
</html>
