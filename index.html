<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Робот-Фиксатор скорости | Быстрая система</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1e;
            color: #eef2ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Вкладки */
        .tab-bar {
            background: #111827;
            border-bottom: 1px solid #1f2a3e;
            padding: 8px 16px 0;
            display: flex;
            gap: 24px;
            flex-shrink: 0;
        }

        .tab-button {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 0 10px;
            color: #9ca3af;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #60a5fa;
            border-bottom: 2px solid #60a5fa;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active-pane {
            display: block;
        }

        /* Камера */
        .camera-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4/3;
            width: 100%;
            margin-bottom: 16px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Панель статуса */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .status-icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 4px;
        }

        .status-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .status-value {
            font-weight: 700;
            font-size: 0.85rem;
        }

        .status-active { color: #10b981; }
        .status-inactive { color: #ef4444; }
        .status-warning { color: #f59e0b; }

        /* Скорость */
        .speed-section {
            background: #1e293b;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        .speed-title {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .speed-value {
            font-size: 3rem;
            font-weight: 800;
            font-family: monospace;
            color: #facc15;
        }

        .speed-unit {
            font-size: 1rem;
            color: #94a3b8;
        }

        .stability-bar {
            margin-top: 12px;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            overflow: hidden;
        }

        .stability-fill {
            height: 100%;
            width: 0%;
            transition: width 0.05s linear;
            border-radius: 2px;
        }

        /* Уведомления */
        .alert {
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 8px;
            animation: fadeIn 0.2s;
        }

        .alert-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .alert-warning { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .alert-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .alert-info { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Штрафы */
        .fines-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .fine-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
        }

        .fine-photo {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
        }

        .fine-info {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .fine-datetime {
            font-family: monospace;
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .fine-rpm {
            background: #dc2626;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .empty-fines {
            text-align: center;
            padding: 40px;
            background: #1e293b;
            border-radius: 20px;
            color: #94a3b8;
        }

        .clear-btn {
            background: #334155;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            margin-top: 16px;
            width: 100%;
            cursor: pointer;
        }

        .info-note {
            background: #0f172a;
            border-radius: 12px;
            padding: 10px;
            font-size: 0.7rem;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-button active" data-tab="camera">📸 Камера</button>
    <button class="tab-button" data-tab="fines">📜 Штрафы</button>
</div>

<div class="tab-content">
    <div id="camera-pane" class="tab-pane active-pane">
        <div class="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <span class="status-icon" id="phoneIcon">📱</span>
                <div class="status-label">Телефон</div>
                <div class="status-value" id="phoneStatus">Анализ...</div>
            </div>
            <div class="status-card">
                <span class="status-icon" id="robotIcon">🤖</span>
                <div class="status-label">Робот</div>
                <div class="status-value" id="robotStatus">Поиск...</div>
            </div>
        </div>

        <div class="speed-section">
            <div class="speed-title">🌀 СКОРОСТЬ ВРАЩЕНИЯ</div>
            <div><span class="speed-value" id="rpmValue">0</span><span class="speed-unit"> об/мин</span></div>
            <div class="stability-bar">
                <div class="stability-fill" id="stabilityFill"></div>
            </div>
        </div>

        <div id="alerts"></div>

        <div class="info-note">
            📌 Поставьте телефон на стол → наведите на робота → автоматическое измерение скорости<br>
            ⚡ Превышение 50 об/мин → фото + штраф
        </div>
    </div>

    <div id="fines-pane" class="tab-pane">
        <div id="finesList"></div>
        <button id="clearFinesBtn" class="clear-btn">🗑 Очистить историю</button>
    </div>
</div>

<script>
    // ========== УПРОЩЕННАЯ ОПТИМИЗИРОВАННАЯ ВЕРСИЯ ==========
    
    // DOM элементы
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const rpmSpan = document.getElementById('rpmValue');
    const phoneStatusSpan = document.getElementById('phoneStatus');
    const robotStatusSpan = document.getElementById('robotStatus');
    const phoneIconSpan = document.getElementById('phoneIcon');
    const robotIconSpan = document.getElementById('robotIcon');
    const stabilityFill = document.getElementById('stabilityFill');
    const alertsDiv = document.getElementById('alerts');
    
    // Состояние
    let isPhoneMoving = true;
    let stability = 0;
    let robotDetected = false;
    let robotType = null;
    let currentRPM = 0;
    let fines = [];
    let animationId = null;
    let lastRobotCheck = 0;
    let lastMotionTime = 0;
    let lastViolation = 0;
    let prevFrame = null;
    let rpmFiltered = 0;
    
    // ========== ШТРАФЫ ==========
    function loadFines() {
        try {
            const saved = localStorage.getItem('robot_fines');
            if (saved) fines = JSON.parse(saved);
        } catch(e) { fines = []; }
        renderFines();
    }
    
    function saveFines() {
        localStorage.setItem('robot_fines', JSON.stringify(fines.slice(0, 30)));
    }
    
    function addFine(rpm, type) {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        if (video.videoWidth) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        }
        const imgData = canvas.toDataURL('image/jpeg', 0.7);
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', { hour12: false });
        const dateStr = now.toLocaleDateString('ru-RU');
        
        fines.unshift({
            img: imgData,
            time: `${dateStr} ${timeStr}`,
            rpm: rpm.toFixed(1),
            type: type
        });
        if (fines.length > 30) fines.pop();
        saveFines();
        renderFines();
        showAlert('danger', `⚠️ ШТРАФ! ${rpm.toFixed(1)} об/мин - превышение скорости`, 2500);
    }
    
    function renderFines() {
        const container = document.getElementById('finesList');
        if (!container) return;
        
        if (fines.length === 0) {
            container.innerHTML = '<div class="empty-fines">📭 Нет нарушений</div>';
            return;
        }
        
        container.innerHTML = fines.map(f => `
            <div class="fine-card">
                <img class="fine-photo" src="${f.img}" alt="нарушение">
                <div class="fine-info">
                    <span class="fine-datetime">🕒 ${f.time}</span>
                    <span class="fine-rpm">${f.type === 'wheels' ? '⚙️' : '🐛'} ${f.rpm} об/мин</span>
                </div>
            </div>
        `).join('');
    }
    
    function clearFines() {
        if (confirm('Удалить все штрафы?')) {
            fines = [];
            saveFines();
            renderFines();
        }
    }
    
    // ========== УВЕДОМЛЕНИЯ ==========
    let alertTimeout = null;
    function showAlert(type, message, duration = 2000) {
        alertsDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        if (alertTimeout) clearTimeout(alertTimeout);
        if (duration > 0) {
            alertTimeout = setTimeout(() => {
                alertsDiv.innerHTML = '';
            }, duration);
        }
    }
    
    // ========== ДЕТЕКЦИЯ ДВИЖЕНИЯ ТЕЛЕФОНА ==========
    let motionBuffer = [];
    
    function handleMotion(event) {
        const acc = event.accelerationIncludingGravity;
        if (!acc) return;
        
        const mag = Math.abs((acc.x || 0)) + Math.abs((acc.y || 0)) + Math.abs((acc.z || 0));
        const deviation = Math.abs(mag - 9.8);
        
        motionBuffer.push(deviation);
        if (motionBuffer.length > 10) motionBuffer.shift();
        
        const avgDev = motionBuffer.reduce((a,b) => a+b, 0) / motionBuffer.length;
        stability = Math.max(0, Math.min(100, 100 - avgDev * 10));
        
        isPhoneMoving = stability < 60;
        
        // Обновляем UI
        if (isPhoneMoving) {
            phoneStatusSpan.innerHTML = '⚠️ ДВИЖЕТСЯ';
            phoneStatusSpan.className = 'status-value status-inactive';
            phoneIconSpan.innerHTML = '📱⚠️';
        } else {
            phoneStatusSpan.innerHTML = '✅ СТАБИЛЕН';
            phoneStatusSpan.className = 'status-value status-active';
            phoneIconSpan.innerHTML = '📱✅';
        }
        
        stabilityFill.style.width = stability + '%';
        if (stability > 70) stabilityFill.style.background = '#10b981';
        else if (stability > 40) stabilityFill.style.background = '#f59e0b';
        else stabilityFill.style.background = '#ef4444';
    }
    
    // Инициализация акселерометра
    function initMotion() {
        if (!window.DeviceMotionEvent) {
            isPhoneMoving = false;
            stability = 100;
            phoneStatusSpan.innerHTML = '✅ СТАБИЛЕН';
            return;
        }
        
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            document.body.addEventListener('click', () => {
                DeviceMotionEvent.requestPermission().then(p => {
                    if (p === 'granted') window.addEventListener('devicemotion', handleMotion);
                }).catch(console.log);
            }, { once: true });
        } else {
            window.addEventListener('devicemotion', handleMotion);
        }
    }
    
    // ========== РАСПОЗНАВАНИЕ РОБОТА (УПРОЩЕННОЕ И БЫСТРОЕ) ==========
    function detectRobotFast(imageData, w, h) {
        const data = imageData.data;
        let edges = 0;
        let circles = 0;
        
        // Быстрый поиск границ (каждый 6-й пиксель)
        for (let y = 8; y < h - 8; y += 6) {
            for (let x = 8; x < w - 8; x += 6) {
                const idx = (y * w + x) * 4;
                const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                const idxR = (y * w + x + 4) * 4;
                const brightR = (data[idxR] + data[idxR+1] + data[idxR+2]) / 3;
                if (Math.abs(bright - brightR) > 40) edges++;
            }
        }
        
        if (edges < 25) return { detected: false, type: null };
        
        // Поиск круговых форм (колеса)
        for (let y = 20; y < h - 20; y += 12) {
            for (let x = 20; x < w - 20; x += 12) {
                let circleScore = 0;
                for (let r = 8; r <= 20; r += 4) {
                    for (let a = 0; a < 360; a += 45) {
                        const rad = a * Math.PI / 180;
                        const px = x + r * Math.cos(rad);
                        const py = y + r * Math.sin(rad);
                        if (px >= 0 && px < w && py >= 0 && py < h) {
                            const idx = (Math.floor(py) * w + Math.floor(px)) * 4;
                            const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                            if (bright < 80) circleScore++;
                        }
                    }
                }
                if (circleScore > 20) circles++;
            }
        }
        
        if (circles > 3) return { detected: true, type: 'wheels' };
        if (edges > 60) return { detected: true, type: 'tracks' };
        
        return { detected: false, type: null };
    }
    
    // ========== АНАЛИЗ ДВИЖЕНИЯ ==========
    function analyzeMotionFast(currentFrame, w, h) {
        if (!prevFrame) return 0;
        
        let diff = 0;
        let count = 0;
        // Анализируем каждый 8-й пиксель для скорости
        for (let i = 0; i < w * h; i += 8) {
            diff += Math.abs(prevFrame[i] - currentFrame[i]);
            count++;
        }
        return diff / count;
    }
    
    function getGrayFrameFast(w, h) {
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, w, h);
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;
        const gray = new Uint8ClampedArray(w * h);
        for (let i = 0; i < w * h; i++) {
            gray[i] = (data[i*4] + data[i*4+1] + data[i*4+2]) / 3;
        }
        return gray;
    }
    
    function drawOverlay() {
        const ctx = overlayCanvas.getContext('2d');
        if (!video.videoWidth) return;
        
        overlayCanvas.width = video.videoWidth;
        overlayCanvas.height = video.videoHeight;
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        
        const isActive = (!isPhoneMoving && robotDetected);
        
        if (robotDetected) {
            ctx.strokeStyle = isActive ? '#10b981' : '#f59e0b';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, overlayCanvas.width - 20, overlayCanvas.height - 20);
            ctx.font = 'bold 12px system-ui';
            ctx.fillStyle = isActive ? '#10b981' : '#f59e0b';
            const label = robotType === 'wheels' ? '⚙️ РОБОТ' : '🐛 РОБОТ';
            ctx.fillText(label, 20, 35);
        }
    }
    
    // ========== ОСНОВНОЙ ЦИКЛ (ОПТИМИЗИРОВАННЫЙ) ==========
    let frameSkip = 0;
    
    async function mainLoop() {
        if (!video.videoWidth) {
            animationId = requestAnimationFrame(mainLoop);
            return;
        }
        
        frameSkip++;
        
        // Распознавание робота (каждые 15 кадров)
        if (frameSkip % 8 === 0) {
            const w = Math.min(160, video.videoWidth);
            const h = Math.floor(w * video.videoHeight / video.videoWidth);
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, w, h);
            const imgData = ctx.getImageData(0, 0, w, h);
            
            const detection = detectRobotFast(imgData, w, h);
            robotDetected = detection.detected;
            robotType = detection.type;
            
            if (robotDetected) {
                robotStatusSpan.innerHTML = robotType === 'wheels' ? '⚙️ С КОЛЁСАМИ' : '🐛 НА ГУСЕНИЦАХ';
                robotStatusSpan.className = 'status-value status-active';
                robotIconSpan.innerHTML = robotType === 'wheels' ? '⚙️' : '🐛';
            } else {
                robotStatusSpan.innerHTML = '❌ НЕ НАЙДЕН';
                robotStatusSpan.className = 'status-value status-inactive';
                robotIconSpan.innerHTML = '🤖❌';
            }
            
            drawOverlay();
        }
        
        // Измерение скорости (только если условия выполнены)
        const isActive = (!isPhoneMoving && robotDetected);
        
        if (isActive && frameSkip % 2 === 0) {
            const w = Math.min(120, video.videoWidth);
            const h = Math.floor(w * video.videoHeight / video.videoWidth);
            const gray = getGrayFrameFast(w, h);
            
            const motion = analyzeMotionFast(gray, w, h);
            let rawRPM = motion * 6;
            rpmFiltered = rpmFiltered * 0.7 + rawRPM * 0.3;
            currentRPM = Math.min(120, Math.max(0, rpmFiltered));
            rpmSpan.textContent = Math.floor(currentRPM);
            
            // Проверка превышения
            const now = Date.now();
            if (currentRPM > 50 && now - lastViolation > 2000) {
                addFine(currentRPM, robotType);
                lastViolation = now;
            }
            
            prevFrame = gray;
        } else if (!isActive) {
            if (currentRPM !== 0) {
                currentRPM = 0;
                rpmFiltered = 0;
                rpmSpan.textContent = '0';
            }
            prevFrame = null;
        }
        
        // Показываем статус системы
        if (isActive && frameSkip % 20 === 0) {
            if (alertsDiv.innerHTML === '' || alertsDiv.innerHTML.includes('АКТИВНА')) {
                // не спамим
            } else if (!alertsDiv.innerHTML.includes('АКТИВНА')) {
                showAlert('success', '✅ Система активна - измерение скорости', 1500);
            }
        } else if (isPhoneMoving && !robotDetected && frameSkip % 30 === 0) {
            showAlert('warning', '📱 Поставьте телефон на стол и наведите на робота', 1500);
        } else if (isPhoneMoving && frameSkip % 40 === 0) {
            showAlert('warning', '📱 Телефон должен быть неподвижен', 1500);
        } else if (!robotDetected && !isPhoneMoving && frameSkip % 40 === 0) {
            showAlert('warning', '🤖 Наведите камеру на робота', 1500);
        }
        
        animationId = requestAnimationFrame(mainLoop);
    }
    
    // ========== КАМЕРА ==========
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 720 }, height: { ideal: 540 } }
            });
            video.srcObject = stream;
            await video.play();
            showAlert('success', '✅ Камера готова', 1500);
        } catch (err) {
            console.error(err);
            showAlert('danger', '❌ Нет доступа к камере', 3000);
        }
    }
    
    // ========== ЗАПУСК ==========
    document.getElementById('clearFinesBtn').addEventListener('click', clearFines);
    
    // Переключение вкладок
    document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
            document.getElementById(`${tab}-pane`).classList.add('active-pane');
        });
    });
    
    loadFines();
    initMotion();
    initCamera();
    mainLoop();
    
    // Очистка при закрытии
    window.addEventListener('beforeunload', () => {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
        }
        if (animationId) cancelAnimationFrame(animationId);
    });
</script>
</body>
</html>
